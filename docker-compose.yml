services:
  db:
    image: postgres:16-alpine
    container_name: kompak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kompak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kompak}
      POSTGRES_DB: ${POSTGRES_DB:-kompak}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/docker-init:/docker-entrypoint-initdb.d:ro
      - ./db:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kompak} -d ${POSTGRES_DB:-kompak}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
